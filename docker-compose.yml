services:
  # ─────────────────────────────
  # ZOOKEEPER + KAFKA
  # ─────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────
  # MINIO
  # ─────────────────────────────
  minio:
    image: minio/minio
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  # ─────────────────────────────
  # PROJECT POSTGRES (your pipeline data)
  # ─────────────────────────────
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: currency_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d currency_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # AIRFLOW METADATA POSTGRES
  # ─────────────────────────────
  postgres_airflow:
    image: postgres:15
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # AIRFLOW INIT
  # ─────────────────────────────
  airflow-init:
    image: apache/airflow:2.8.1
    depends_on:
      - postgres_airflow
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./ingestion:/opt/airflow/ingestion
      - ./streaming:/opt/airflow/streaming
      - ./plugins:/opt/airflow/plugins
      - ./transformation:/opt/airflow/transformation
      - ./requirements.txt:/requirements.txt
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --user -r /requirements.txt &&
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  # ─────────────────────────────
  # AIRFLOW WEBSERVER
  # ─────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.8.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_airflow:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./ingestion:/opt/airflow/ingestion
      - ./streaming:/opt/airflow/streaming
      - ./plugins:/opt/airflow/plugins
      - ./transformation:/opt/airflow/transformation
      - ./requirements.txt:/requirements.txt
    ports:
      - "8080:8080"
    command: >
      bash -c "pip install --user -r /requirements.txt && airflow webserver"
  # ─────────────────────────────
  # AIRFLOW SCHEDULER
  # ─────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.8.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres_airflow:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./ingestion:/opt/airflow/ingestion
      - ./streaming:/opt/airflow/streaming
      - ./plugins:/opt/airflow/plugins
      - ./transformation:/opt/airflow/transformation
      - ./requirements.txt:/requirements.txt
    command: >
      bash -c "pip install --user -r /requirements.txt && airflow scheduler"

volumes:
  postgres_data:
  airflow_db_data:
